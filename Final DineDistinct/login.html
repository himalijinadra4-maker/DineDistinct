<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – DineDistinct</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root { --gold:#c9a84c; --gold-light:#e8c97a; --dark:#0a0a0a; --dark2:#111111; --dark3:#1a1a1a; --cream:#f5f0e8; --text-muted:#888; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--dark); color:var(--cream); font-family:'Lato',sans-serif; font-weight:300;
      min-height:100vh; display:grid; grid-template-columns:1fr 1fr;
    }

    /* LEFT PANEL */
    .login-visual {
      background: url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900') center/cover no-repeat;
      position:relative; display:flex; flex-direction:column; justify-content:space-between;
      padding:40px 50px;
    }
    .login-visual::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.72); }
    .login-visual-content { position:relative; z-index:1; }
    .lv-logo { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--gold); letter-spacing:2px; text-decoration:none; display:block; }
    .lv-bottom { position:relative; z-index:1; }
    .lv-bottom blockquote { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-style:italic; color:rgba(245,240,232,0.85); line-height:1.5; margin-bottom:16px; }
    .lv-bottom cite { font-size:0.75rem; letter-spacing:2px; color:var(--gold); text-transform:uppercase; }

    /* RIGHT PANEL */
    .login-form-wrap {
      background:var(--dark2); display:flex; align-items:center; justify-content:center;
      padding:60px 70px;
    }
    .login-box { width:100%; max-width:420px; }
    .login-box .back-link { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); text-decoration:none; display:inline-block; margin-bottom:48px; transition:color 0.3s; }
    .login-box .back-link:hover { color:var(--gold); }
    .login-box .tag { font-size:0.65rem; letter-spacing:5px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
    .login-box h2 { font-family:'Playfair Display',serif; font-size:2.2rem; margin-bottom:8px; }
    .login-box .sub { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--text-muted); margin-bottom:36px; }
    .gold-line { width:50px; height:1px; background:var(--gold); margin-bottom:36px; }

    .form-group { margin-bottom:22px; position:relative; }
    .form-group label { display:block; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:9px; }
    .form-group input {
      width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.2);
      color:var(--cream); padding:14px 18px; font-family:'Lato',sans-serif; font-size:0.92rem;
      outline:none; transition:border-color 0.3s;
    }
    .form-group input:focus { border-color:var(--gold); }
    .form-group input::placeholder { color:rgba(136,136,136,0.6); }

    .show-pass-btn { position:absolute; right:16px; top:38px; background:none; border:none; color:var(--text-muted); font-size:0.72rem; letter-spacing:1px; cursor:pointer; text-transform:uppercase; transition:color 0.3s; }
    .show-pass-btn:hover { color:var(--gold); }

    .form-options { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
    .checkbox-wrap { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .checkbox-wrap input[type=checkbox] { accent-color:var(--gold); width:15px; height:15px; }
    .checkbox-wrap span { font-size:0.82rem; color:var(--text-muted); }
    .forgot-link { font-size:0.78rem; color:var(--text-muted); text-decoration:none; transition:color 0.3s; }
    .forgot-link:hover { color:var(--gold); }

    .btn-gold { width:100%; background:var(--gold); color:var(--dark); padding:16px; font-size:0.8rem; letter-spacing:2.5px; text-transform:uppercase; border:none; cursor:pointer; font-family:'Lato',sans-serif; font-weight:400; transition:all 0.3s; }
    .btn-gold:hover { background:var(--gold-light); }

    .divider { display:flex; align-items:center; gap:14px; margin:28px 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
    .divider span { font-size:0.7rem; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }

    .signup-link { text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:10px; }
    .signup-link a { color:var(--gold); text-decoration:none; transition:color 0.3s; }
    .signup-link a:hover { color:var(--gold-light); }

    .error-msg { background:rgba(200,60,60,0.1); border:1px solid rgba(200,60,60,0.3); color:#e08080; padding:12px 16px; font-size:0.85rem; margin-bottom:20px; display:none; }
    .error-msg.show { display:block; }

    @media(max-width:800px){
      body { grid-template-columns:1fr; }
      .login-visual { display:none; }
      .login-form-wrap { padding:40px 24px; min-height:100vh; }
    }
  </style>
</head>
<body>

<!-- LEFT VISUAL -->
<div class="login-visual">
  <div class="login-visual-content">
    <a href="index.html" class="lv-logo">DineDistinct</a>
  </div>
  <div class="lv-bottom">
    <blockquote>"Every great meal begins with a moment of anticipation."</blockquote>
    <cite>— Chef Arjun Mehta</cite>
  </div>
</div>

<!-- RIGHT FORM -->
<div class="login-form-wrap">
  <div class="login-box">
    <a href="index.html" class="back-link">&#8592; Back to Home</a>
    <p class="tag">Welcome Back</p>
    <h2>Sign In</h2>
    <p class="sub">Access your reservations and preferences</p>
    <div class="gold-line"></div>

    <div class="error-msg" id="loginError">Incorrect email or password. Please try again.</div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="yourname@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter your password"/>
      <button class="show-pass-btn" onclick="togglePass('loginPass', this)">Show</button>
    </div>
    <div class="form-options">
      <label class="checkbox-wrap">
        <input type="checkbox"/>
        <span>Keep me signed in</span>
      </label>
      <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot Password?</a>
    </div>
    <button class="btn-gold" onclick="handleLogin()">Sign In</button>

    <div class="divider"><span>New to DineDistinct?</span></div>
    <div class="signup-link">Don't have an account? <a href="signup.html">Create one here</a></div>
  </div>
</div>

<script>
  function togglePass(id, btn) {
    var input = document.getElementById(id);
    if(input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
    else { input.type = 'password'; btn.textContent = 'Show'; }
  }
  function handleLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var pass  = document.getElementById('loginPass').value.trim();
    var err   = document.getElementById('loginError');
    err.classList.remove('show');
    if(!email || !pass) { err.textContent = 'Please enter your email and password.'; err.classList.add('show'); return; }
    if(!email.includes('@')) { err.textContent = 'Please enter a valid email address.'; err.classList.add('show'); return; }
    if(pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return; }
    // Simulate success
    alert('Welcome back! Redirecting to your dashboard...');
    window.location.href = 'index.html';
  }
  function forgotPassword() {
    var email = document.getElementById('loginEmail').value.trim();
    if(!email) { alert('Please enter your registered email address first.'); return; }
    alert('A password reset link has been sent to: ' + email);
  }
  document.addEventListener('keydown', function(e){ if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
